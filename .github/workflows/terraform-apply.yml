name: Terraform Apply

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::202564564111:role/ev-fleet-github-actions-role
          aws-region: eu-west-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Lambda zip files
        run: |
          mkdir -p build
          zip -j build/ingestor_lambda.zip src/ingestor/ingestor.py
          zip -j build/transformer_lambda.zip src/transformer/silver_transform.py
          zip -j build/gold_lambda.zip src/gold/gold_aggregator.py
          zip -j build/optimizer_lambda.zip src/optimizer/optimizer.py
          zip -j build/silver_lambda.zip src/transformer/silver_transform.py
          python3 -c "
          import zipfile, os
          with zipfile.ZipFile('build/dummy_lambda.zip', 'w') as z:
              z.writestr('dummy.py', 'def handler(event, context): return {}')
          "

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
